aid: google-cloud-deploy
name: Google Cloud Deploy
description: >-
  Google Cloud Deploy is a managed continuous delivery service that automates
  the deployment of applications to Google Cloud target environments such as
  GKE, Cloud Run, and Anthos. It provides an opinionated delivery pipeline
  that promotes releases through a series of target environments with
  approval gates, rollback capabilities, and deployment verification,
  enabling safe and repeatable software delivery workflows.
