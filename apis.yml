apis:
  - name: Cloud Deploy API
    description: >-
      The Cloud Deploy API provides programmatic access to manage delivery
      pipelines, targets, releases, and rollouts for continuous delivery
      workflows. Developers can use the API to create and manage delivery
      pipelines that define the progression of releases through target
      environments, create releases from build artifacts, promote releases
      between targets, approve rollouts, and manage rollback operations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/deploy/docs
